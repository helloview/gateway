events {}

http {
  upstream ums_upstream {
    server user-management-service:8082;
  }

  upstream todo_upstream {
    server todo-service:8081;
  }

  server {
    listen 80;
    server_name _;

    location = /ums {
      return 301 /ums/;
    }

    location = /todo {
      return 301 /todo/;
    }

    location /ums/ {
      proxy_pass http://ums_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /ums;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /todo/ {
      proxy_pass http://todo_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /todo;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / {
      default_type application/json;
      return 200 '{"service":"helloview-gateway","routes":["/ums/*","/todo/*"]}';
    }
  }
}

events {}

http {
  client_max_body_size 64m;

  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 5s;

  server {
    listen 80;
    server_name _;

    location = /ums {
      return 301 /ums/;
    }

    location = /todo {
      return 301 /todo/;
    }

    location = /studio {
      return 301 /studio/;
    }

    location = /gemini {
      return 301 /gemini/;
    }

    location = /ollama {
      return 301 /ollama/;
    }

    location = /r2 {
      return 301 /r2/;
    }

    location = /chatbox {
      return 301 /chatbox/;
    }

    location /ums/ {
      set $ums_upstream user-management-service:8082;
      rewrite ^/ums/?(.*)$ /$1 break;
      proxy_pass http://$ums_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /ums;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /todo/ {
      set $todo_upstream todo-service:8081;
      rewrite ^/todo/?(.*)$ /$1 break;
      proxy_pass http://$todo_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /todo;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /studio/ {
      set $studio_upstream workspace-service:8083;
      rewrite ^/studio/?(.*)$ /$1 break;
      proxy_pass http://$studio_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /studio;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /gemini/ {
      set $gemini_upstream gemini-llm-service:6800;
      rewrite ^/gemini/?(.*)$ /$1 break;
      proxy_pass http://$gemini_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /gemini;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /ollama/ {
      set $ollama_upstream ollama-llm-service:6802;
      rewrite ^/ollama/?(.*)$ /$1 break;
      proxy_pass http://$ollama_upstream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_request_buffering off;
      proxy_connect_timeout 30s;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /ollama;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /r2/ {
      set $r2_upstream cloudflare-r2-service:6801;
      rewrite ^/r2/?(.*)$ /$1 break;
      proxy_pass http://$r2_upstream;
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /r2;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /chatbox/ {
      set $chatbox_upstream chatbox-service:6803;
      rewrite ^/chatbox/?(.*)$ /$1 break;
      proxy_pass http://$chatbox_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /chatbox;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / {
      default_type application/json;
      return 200 '{"service":"helloview-gateway","routes":["/ums/*","/todo/*","/studio/*","/gemini/*","/ollama/*","/r2/*","/chatbox/*"]}';
    }
  }
}

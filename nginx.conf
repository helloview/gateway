events {}

http {
  server {
    listen 80;
    server_name _;

    # Normalize prefix paths without trailing slash.
    location = /ums {
      return 301 /ums/;
    }

    location = /todo {
      return 301 /todo/;
    }

    # UMS reverse proxy: /ums/* -> http://host.docker.internal:8082/*
    location /ums/ {
      proxy_pass http://host.docker.internal:8082/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /ums;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Todo reverse proxy: /todo/* -> http://host.docker.internal:8081/*
    location /todo/ {
      proxy_pass http://host.docker.internal:8081/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /todo;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / {
      default_type application/json;
      return 200 '{"service":"helloview-gateway","routes":["/ums/*","/todo/*"]}';
    }
  }
}
